<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Числовой рандомайзер | Свой набор цифр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .randomizer-card {
            max-width: 780px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            padding: 2rem 2rem 2rem 2rem;
            transition: all 0.2s ease;
            border: 1px solid #e9edf2;
        }

        .title-area {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .title-area h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #1a2c3e;
            letter-spacing: -0.2px;
            margin-bottom: 6px;
        }
        .title-area p {
            color: #5b6e8c;
            font-size: 0.85rem;
            font-weight: 400;
        }

        .display-box {
            background: #f8fafd;
            border-radius: 28px;
            padding: 1.2rem;
            margin-bottom: 1.8rem;
            border: 1px solid #eef2f7;
        }
        .result-panel {
            background: white;
            border-radius: 24px;
            padding: 1.4rem 0.8rem;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
            border: 1px solid #eef2f8;
        }
        .result-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b9ab0;
            margin-bottom: 0.7rem;
        }
        #randomResult {
            font-size: 4.2rem;
            font-weight: 800;
            color: #1e466e;
            line-height: 1.2;
            word-break: break-word;
            transition: all 0.2s;
        }
        .btn-random {
            margin-top: 1.2rem;
            background: #2c5a8c;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            width: auto;
            min-width: 200px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(44, 90, 140, 0.2);
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-random:hover {
            background: #1e466e;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(44, 90, 140, 0.2);
        }
        .btn-random:active {
            transform: translateY(1px);
        }

        .numbers-editor {
            margin: 1.5rem 0 0.8rem;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            gap: 10px;
        }
        .section-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e2f3e;
        }
        .badge-count {
            background: #eef2fa;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c5a8c;
        }
        .numbers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.2rem;
            background: #fefefe;
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid #eef2f8;
            min-height: 110px;
        }
        .number-chip {
            background: #ffffff;
            border-radius: 48px;
            border: 1px solid #dce3ec;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px 4px 16px;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .number-chip:hover {
            border-color: #8aa9c9;
            background: #fafcff;
        }
        .number-chip input {
            width: 80px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 500;
            color: #1e3a5f;
            padding: 8px 0;
            outline: none;
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        .number-chip input:focus {
            border-bottom: 1px solid #2c5a8c;
        }
        .delete-chip {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #9aaebf;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-weight: 600;
        }
        .delete-chip:hover {
            background: #f3e9e9;
            color: #c74531;
        }
        .add-btn {
            background: #ecf3f9;
            border: 1px solid #cbdae9;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c5a8c;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .add-btn:hover {
            background: #e2ecf5;
            border-color: #8aa9c9;
        }
        .action-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
            justify-content: space-between;
            align-items: center;
        }
        .secondary-btn {
            background: transparent;
            border: 1px solid #cfddee;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #4f6f8f;
            cursor: pointer;
            transition: 0.2s;
        }
        .secondary-btn:hover {
            background: #eef2f8;
            border-color: #8aa9c9;
            color: #1e466e;
        }
        .warning-note {
            font-size: 0.68rem;
            color: #8da0b8;
            text-align: center;
            margin-top: 1rem;
        }
        footer {
            text-align: center;
            margin-top: 1.6rem;
            font-size: 0.65rem;
            color: #95a9c2;
        }
        @media (max-width: 550px) {
            .randomizer-card {
                padding: 1.3rem;
            }
            #randomResult {
                font-size: 2.8rem;
            }
            .number-chip input {
                width: 65px;
            }
        }
        .pulse {
            animation: pop 0.2s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.96); opacity: 0.8; }
            80% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button {
            opacity: 0.3;
        }
    </style>
</head>
<body>

<div class="randomizer-card">
    <div class="title-area">
        <h1>Числовой рандомайзер</h1>
        <p>Задайте набор цифр или чисел — из них будет случайный выбор</p>
    </div>

    <div class="display-box">
        <div class="result-panel">
            <div class="result-label">СЛУЧАЙНОЕ ЧИСЛО ИЗ ВАШЕГО НАБОРА</div>
            <div id="randomResult">?</div>
            <button id="rollBtn" class="btn-random">Сгенерировать</button>
        </div>
    </div>

    <div class="numbers-editor">
        <div class="section-header">
            <h3>Мои числа</h3>
            <span class="badge-count" id="countBadge">0 элементов</span>
        </div>
        <div id="numbersContainer" class="numbers-grid">
            <!-- динамические ячейки с числами -->
        </div>
        <div class="action-bar">
            <button id="addNumberBtn" class="add-btn">+ Добавить ячейку</button>
            <button id="resetDefaultBtn" class="secondary-btn">Сбросить (1, 5, 10, 42, 99)</button>
            <button id="clearAllBtn" class="secondary-btn">Очистить все</button>
        </div>
        <div class="warning-note">
            Введите любые числа (целые или дробные). Пустые или нечисловые значения не участвуют в выборе.
        </div>
    </div>
    <footer>Рандом только среди корректно заполненных ячеек</footer>
</div>

<script>
    // массив объектов: { id, value: число или null }
    let numberItems = [];
    let nextId = 1;

    const numbersContainer = document.getElementById('numbersContainer');
    const rollBtn = document.getElementById('rollBtn');
    const randomResultSpan = document.getElementById('randomResult');
    const addNumberBtn = document.getElementById('addNumberBtn');
    const resetDefaultBtn = document.getElementById('resetDefaultBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const countBadge = document.getElementById('countBadge');

    // получить массив валидных чисел (числовые значения, не null, не NaN)
    function getValidNumbers() {
        const valid = [];
        for (let item of numberItems) {
            if (item.value !== null && typeof item.value === 'number' && !isNaN(item.value)) {
                valid.push(item.value);
            }
        }
        return valid;
    }

    // обновить счётчик и отображение статуса
    function updateCounterBadge() {
        const validCount = getValidNumbers().length;
        const total = numberItems.length;
        if (total === 0) {
            countBadge.innerText = `0 элементов`;
            countBadge.style.color = "#8b9ab0";
        } else if (validCount === total) {
            countBadge.innerText = `${validCount} элемент${getDeclension(validCount)}`;
            countBadge.style.color = "#2c5a8c";
        } else {
            countBadge.innerText = `${validCount} / ${total} корректных`;
            countBadge.style.color = "#c97e5a";
        }
    }

    function getDeclension(n) {
        if (n % 10 === 1 && n % 100 !== 11) return '';
        if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'а';
        return 'ов';
    }

    // удалить элемент по id
    function removeNumberItem(id) {
        const index = numberItems.findIndex(item => item.id === id);
        if (index !== -1) {
            numberItems.splice(index, 1);
            renderNumbers();
        }
    }

    // добавить новую пустую ячейку
    function addNumberItem(initialValue = null) {
        const newId = nextId++;
        numberItems.push({
            id: newId,
            value: (initialValue !== null && !isNaN(Number(initialValue))) ? Number(initialValue) : null,
        });
        renderNumbers();
        // небольшой скролл к новой ячейке
        setTimeout(() => {
            if (numbersContainer.lastChild && numbersContainer.lastChild.scrollIntoView) {
                numbersContainer.lastChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }, 30);
    }

    // отрисовка всех ячеек
    function renderNumbers() {
        if (!numbersContainer) return;
        numbersContainer.innerHTML = '';
        if (numberItems.length === 0) {
            const emptyMsg = document.createElement('div');
            emptyMsg.style.width = '100%';
            emptyMsg.style.textAlign = 'center';
            emptyMsg.style.padding = '24px';
            emptyMsg.style.color = '#8ba0bc';
            emptyMsg.style.fontSize = '0.8rem';
            emptyMsg.innerText = 'Нет ячеек. Нажмите "Добавить ячейку"';
            numbersContainer.appendChild(emptyMsg);
        } else {
            numberItems.forEach(item => {
                const chip = document.createElement('div');
                chip.className = 'number-chip';
                chip.dataset.id = item.id;

                const input = document.createElement('input');
                input.type = 'number';
                input.step = 'any';
                input.value = (item.value !== null && !isNaN(item.value)) ? item.value : '';
                input.placeholder = 'число';
                
                // функция обновления значения из поля
                const updateValueFromInput = () => {
                    let rawValue = input.value.trim();
                    if (rawValue === '') {
                        item.value = null;
                    } else {
                        let num = Number(rawValue);
                        if (!isNaN(num) && rawValue !== '') {
                            item.value = num;
                        } else {
                            item.value = null;
                        }
                    }
                    updateCounterBadge();
                };
                
                input.addEventListener('input', updateValueFromInput);
                input.addEventListener('change', updateValueFromInput);
                
                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = '✕';
                deleteBtn.className = 'delete-chip';
                deleteBtn.title = 'Удалить';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeNumberItem(item.id);
                });
                
                chip.appendChild(input);
                chip.appendChild(deleteBtn);
                numbersContainer.appendChild(chip);
            });
        }
        updateCounterBadge();
    }

    // очистить все ячейки
    function clearAllItems() {
        numberItems = [];
        nextId = 1;
        renderNumbers();
    }

    // установить стандартный набор: 1,5,10,42,99
    function setDefaultNumbers() {
        numberItems = [];
        nextId = 1;
        const defaults = [1, 5, 10, 42, 99];
        for (let val of defaults) {
            numberItems.push({
                id: nextId++,
                value: val,
            });
        }
        renderNumbers();
    }

    // выбрать случайное число из валидных
    function pickRandomFromValid() {
        const validNumbers = getValidNumbers();
        if (validNumbers.length === 0) {
            return null;
        }
        const randomIndex = Math.floor(Math.random() * validNumbers.length);
        return validNumbers[randomIndex];
    }

    // отобразить результат с анимацией
    function displayRandomResult() {
        const chosen = pickRandomFromValid();
        if (chosen === null) {
            randomResultSpan.innerHTML = 'нет чисел';
            randomResultSpan.style.color = "#c97e5a";
            randomResultSpan.style.background = "none";
            randomResultSpan.classList.add('pulse');
            setTimeout(() => randomResultSpan.classList.remove('pulse'), 200);
            return;
        }
        randomResultSpan.innerHTML = chosen;
        randomResultSpan.style.color = "#1e466e";
        randomResultSpan.style.background = "none";
        randomResultSpan.classList.add('pulse');
        setTimeout(() => randomResultSpan.classList.remove('pulse'), 200);
    }

    // события кнопок
    rollBtn.addEventListener('click', () => {
        displayRandomResult();
    });
    
    addNumberBtn.addEventListener('click', () => {
        addNumberItem(null);
    });
    
    resetDefaultBtn.addEventListener('click', () => {
        setDefaultNumbers();
        const validCount = getValidNumbers().length;
        if (validCount > 0) {
            randomResultSpan.innerHTML = '?';
            randomResultSpan.style.color = "#1e466e";
        } else {
            randomResultSpan.innerHTML = '?';
        }
    });
    
    clearAllBtn.addEventListener('click', () => {
        clearAllItems();
        randomResultSpan.innerHTML = '?';
        randomResultSpan.style.color = "#1e466e";
    });
    
    // начальная инициализация: 3 ячейки с примерами (3, 15, 77) чтобы интерфейс не был пустым
    function initDefault() {
        numberItems = [];
        nextId = 1;
        const starterNumbers = [3, 15, 77];
        for (let v of starterNumbers) {
            numberItems.push({ id: nextId++, value: v });
        }
        renderNumbers();
        randomResultSpan.innerHTML = '?';
        randomResultSpan.style.color = "#1e466e";
    }
    
    initDefault();
</script>
</body>
</html>
